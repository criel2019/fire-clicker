<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="불키우기 - 힐링 불멍 클리커 게임">
  <title>불키우기</title>
  <link rel="manifest" href="/fire-clicker/manifest.json">
  <link rel="icon" type="image/png" href="/fire-clicker/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/fire-clicker/icons/icon-192.png">
  <script type="module" crossorigin src="/fire-clicker/assets/index-DuuVmZer.js"></script>
  <link rel="stylesheet" crossorigin href="/fire-clicker/assets/index-DwVONR5p.css">
</head>
<body>
  <div id="app">
    <!-- Background layer: night sky + stars -->
    <canvas id="bgCanvas"></canvas>

    <!-- Fire glow layer (CSS radial gradient) -->
    <div id="fireGlow"></div>

    <!-- Ground / log silhouette layer -->
    <canvas id="groundCanvas"></canvas>

    <!-- Main fire (WebGL shader) -->
    <canvas id="fireCanvas"></canvas>

    <!-- Toothpick pile layer (sits above fire, below particles) -->
    <canvas id="toothpickCanvas"></canvas>

    <!-- Heat shimmer above fire (atmospheric distortion) -->
    <div id="heatShimmer"></div>

    <!-- Particle overlay (embers, sparks, smoke) -->
    <canvas id="particleCanvas"></canvas>

    <!-- NPC silhouette layer -->
    <canvas id="npcCanvas"></canvas>

    <!-- Fireworks overlay -->
    <div id="fireworksContainer"></div>

    <!-- Screen shake wrapper -->
    <div id="shakeWrapper">
      <!-- Tap ripple effect -->
      <div id="tapRipple"></div>
    </div>

    <!-- HUD (minimal) -->
    <div id="hud">
      <div id="fireLevel">
        <span id="fireLevelIcon">🔥</span>
        <span id="fireLevelText">Lv.1</span>
        <div id="xpBar"><div id="xpFill"></div></div>
      </div>
      <div id="currencyDisplay">
        <div id="ashCount" class="currency">
          <span class="currency-icon ash-icon"></span>
          <span id="ashValue">0</span>
        </div>
        <div id="emberCount" class="currency">
          <span class="currency-icon ember-icon"></span>
          <span id="emberValue">0</span>
        </div>
        <button id="burnLogBtn" title="연소 일지">📖</button>
      </div>
    </div>

    <!-- Temperature indicator -->
    <div id="tempIndicator">
      <div id="tempBar"><div id="tempFill"></div></div>
      <span id="tempText">200°C</span>
    </div>

    <!-- Floating damage numbers container -->
    <div id="floatingNumbers"></div>

    <!-- Item throw animation layer -->
    <div id="throwLayer"></div>

    <!-- Cooking area (floating near fire) -->
    <div id="cookingArea">
      <div id="cookingSlots"></div>
      <button id="cookingMenuBtn" title="굽기">🍢</button>
    </div>

    <!-- Cooking menu popup -->
    <div id="cookingMenu" class="hidden">
      <div id="cookingMenuHeader">
        <span>🍢 불 위에 굽기</span>
        <button id="cookingMenuClose">&times;</button>
      </div>
      <div id="cookingMenuList"></div>
    </div>

    <!-- Inventory drawer -->
    <div id="inventoryDrawer">
      <div id="drawerHandle">
        <div id="handleBar"></div>
        <span id="drawerTitle">연료</span>
      </div>

      <!-- Quick action bar (compact toothpick) -->
      <div id="quickActions">
        <button id="toothpickThrowBtn" class="quick-btn">
          <span class="qb-icon">🪥</span>
          <span class="qb-label">이쑤시개</span>
          <span class="qb-badge">∞</span>
        </button>
      </div>

      <div id="categoryTabs">
        <!-- Generated by JS -->
      </div>
      <div id="itemGrid">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Item detail modal -->
    <div id="itemModal" class="hidden">
      <div id="modalBackdrop"></div>
      <div id="modalContent">
        <div id="modalIcon"></div>
        <h2 id="modalName"></h2>
        <p id="modalDesc"></p>
        <div id="modalStats">
          <span id="modalRarity"></span>
          <span id="modalBurn"></span>
        </div>
        <button id="burnBtn">태우기!</button>
        <button id="modalClose">닫기</button>
      </div>
    </div>

    <!-- Combo indicator — top-right corner -->
    <div id="comboDisplay" class="hidden">
      <span id="comboCount">x2</span>
      <span id="comboLabel">COMBO</span>
    </div>

    <!-- Achievement toast -->
    <div id="achievementToast" class="hidden">
      <div id="achievementIcon"></div>
      <div id="achievementText"></div>
    </div>

    <!-- Restart hint (shown when fire extinguished) -->
    <div id="restartHint">
      <span class="restart-icon">🔥</span>
      <span class="restart-text">탭하여 다시 점화</span>
    </div>

    <!-- Mute toggle -->
    <button id="muteToggle" title="음소거">🔊</button>

    <!-- Ambient mode toggle -->
    <button id="ambientToggle" title="불멍 모드">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>

    <!-- Intro overlay -->
    <div id="introOverlay">
      <canvas id="introCanvas"></canvas>
      <div id="introTapText">TAP</div>
    </div>
  </div>

</body>
</html>
